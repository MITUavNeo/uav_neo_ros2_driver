# Blacklist hid_nintendo so the kernel does not bind it to the kit's ESM-9110
# gamepad (and similar third-party pads that spoof the Switch Pro VID:PID
# 057e:2009).
#
# Background: kernels >= 5.16 ship hid_nintendo. It claims any device reporting
# 057e:2009 and binds it as a Switch Pro controller: 6 axes / 14 buttons, sticks
# resting off-center, A/B/X/Y swapped from Xbox, and no /dev/input/js0. On this
# kit that is the "1 LED" mode students hit intermittently at power-on. It was
# invisible on Pi 4 (its kernel image lacked hid_nintendo); Pi 5 on kernel 6.x
# hits it whenever the pad enumerates in its Switch-spoof profile.
#
# With hid_nintendo blacklisted, hid-generic holds the device briefly, the pad's
# firmware sees no real HID handler responding, and it times out into Xbox 360
# mode, re-enumerating as 2f24:00b7 ("ESM GAME FOR WINDOWS"), which the xpad
# driver binds. Result: /dev/input/js0 appears with the standard XInput layout
# (8 axes / 11 buttons) that config/xbox_mapping.yaml expects, on every boot,
# without relying on the pad's remembered MODE-button state.
#
# Tradeoff: a genuine Nintendo Switch Pro Controller would also be blocked. The
# kit never uses one, so this is acceptable.
#
# Per-device blacklisting isn't possible here (modprobe blacklist is module-wide),
# and udev-based unbinding fails because hid_nintendo re-grabs the device
# immediately after each unbind.
blacklist hid_nintendo
