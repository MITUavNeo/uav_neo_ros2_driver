/**:
  ros__parameters:
    # Device
    serial_no: ""
    device_type: "d435"

    # Depth stream
    enable_depth: true
    depth_module.depth_profile: "640,480,30"

    # Color stream
    enable_color: true
    rgb_camera.color_profile: "640,480,30"

    # Infrared streams
    enable_infra1: true
    enable_infra2: true

    # IMU streams (D435i gyro + accelerometer)
    enable_gyro: true
    enable_accel: true
    unite_imu_method: 2  # 0=none, 1=copy, 2=linear_interpolation
    gyro_fps: 200
    accel_fps: 63

    # Depth post-processing filters
    enable_sync: true
    align_depth.enable: true
    decimation_filter.enable: true
    spatial_filter.enable: true
    temporal_filter.enable: true
    hole_filling_filter.enable: false

    # Point cloud (disabled by default — CPU intensive on Pi 5)
    pointcloud.enable: false

    # TF publishing
    publish_tf: true
    tf_publish_rate: 0.0  # static transforms only

    # Diagnostics
    diagnostics_period: 1.0
