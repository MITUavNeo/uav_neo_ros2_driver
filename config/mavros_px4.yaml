# MAVROS PX4 configuration for UAV Neo
# Pixhawk 2.8.4 connected via UART (TELEM2) on /dev/ttyAMA0

/**:
  ros__parameters:
    startup_px4_usb_quirk: false

# --- system plugins ---

/**/sys:
  ros__parameters:
    min_voltage: [10.0]
    disable_diag: false
    heartbeat_rate: 1.0
    conn_timeout: 10.0

/**/time:
  ros__parameters:
    time_ref_source: "fcu"
    timesync_mode: MAVLINK
    timesync_avg_alpha: 0.6
    timesync_rate: 10.0
    system_time_rate: 1.0

# --- mavros plugins ---

/**/cmd:
  ros__parameters:
    use_comp_id_system_control: false

/**/global_position:
  ros__parameters:
    frame_id: "map"
    child_frame_id: "base_link"
    rot_covariance: 99999.0
    gps_uere: 1.0
    use_relative_alt: true
    tf.send: false
    tf.frame_id: "map"
    tf.global_frame_id: "earth"
    tf.child_frame_id: "base_link"

/**/imu:
  ros__parameters:
    frame_id: "base_link"
    linear_acceleration_stdev: 0.0003
    angular_velocity_stdev: 0.0003490659
    orientation_stdev: 1.0
    magnetic_stdev: 0.0

/**/local_position:
  ros__parameters:
    frame_id: "map"
    tf.send: true
    tf.frame_id: "map"
    tf.child_frame_id: "base_link"
    tf.send_fcu: false

/**/setpoint_accel:
  ros__parameters:
    send_force: false

/**/setpoint_attitude:
  ros__parameters:
    reverse_thrust: false
    use_quaternion: false
    tf.listen: false
    tf.frame_id: "map"
    tf.child_frame_id: "target_attitude"
    tf.rate_limit: 50.0

/**/setpoint_raw:
  ros__parameters:
    thrust_scaling: 1.0

/**/setpoint_position:
  ros__parameters:
    tf.listen: false
    tf.frame_id: "map"
    tf.child_frame_id: "target_position"
    tf.rate_limit: 50.0
    # LOCAL_NED so position setpoints are absolute (anchored to the local
    # origin), not offsets from the current pose. shape_node closed_loop mode
    # relies on this; BODY_NED would make each waypoint drift with the drone.
    mav_frame: LOCAL_NED

/**/setpoint_velocity:
  ros__parameters:
    mav_frame: BODY_NED

/**/mission:
  ros__parameters:
    pull_after_gcs: true
    use_mission_item_int: true

/**/vibration:
  ros__parameters:
    frame_id: "base_link"

/**/odometry:
  ros__parameters:
    fcu.odom_parent_id_des: "odom"
    fcu.odom_child_id_des: "base_link"
    fcu.map_id_des: "map"
